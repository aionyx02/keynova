[hotkeys]
app_launcher   = "Ctrl+K"
mouse_control  = "Ctrl+Alt+M"
workspace_1    = "Ctrl+Alt+1"
workspace_2    = "Ctrl+Alt+2"
workspace_3    = "Ctrl+Alt+3"

[launcher]
scan_paths = []          # 額外掃描路徑（空陣列代表僅掃描系統預設路徑）
max_results = 10
cache_ttl_secs = 300     # 應用列表快取時間（秒）

[search]
backend = "auto"
index_dir = ""
exclude_dirs = "AppData,node_modules,.git,target,dist"
max_file_results = 50

[terminal]
default_shell = ""       # 空字串代表使用系統預設 shell
font_size = 14
scrollback_lines = 1000

[mouse_control]
step_size = 10           # 每次方向鍵移動的像素距離
fast_step_size = 50      # 按住 Shift 時的移動距離

[features]
ai = false
agent = false
translation = true
notes = true
history = true
calculator = true
system = true

[ai]
provider = "ollama"
api_key = ""
model = "qwen2.5:7b"
claude_model = "claude-sonnet-4-6"
ollama_url = "http://localhost:11434"
ollama_timeout_secs = 120
ollama_keep_alive = "5m"     # Ollama model keep-alive duration; set to "0s" to unload immediately
openai_api_key = ""
openai_base_url = "https://api.openai.com/v1"
openai_model = "gpt-4o-mini"
max_tokens = 4096
timeout_secs = 30

[agent]
web_search_provider = "disabled"
long_term_memory_opt_in = false
searxng_url = ""
web_search_api_key = ""
web_search_timeout_secs = 8

[translation]
default_src = "auto"
default_dst = "zh-TW"
provider = "google_free"
timeout_secs = 30

[notes]
storage_dir = ""         # 空字串代表 AppData/Keynova/notes/
default_extension = "md"
lazyvim_command = ""     # Empty means find nvim on PATH
lazyvim_config_dir = ""  # Empty means project-local .keynova/lazyvim/config/keynova-lazyvim

[history]
max_items = 200
ignore_duplicates = true

[system]
enable_volume_control = true
enable_brightness_control = true
enable_wifi_info = true

[performance]
low_memory_mode = false      # true: skip terminal prewarm, defer startup indexing, shorten keep_alive
